<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events Attendance Log</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: #f3f4f6; 
            display: flex; 
            min-height: 100vh; 
            color: #1f2937;
        }

        .left-panel {
            flex: 1.2;
            background: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid #e5e7eb;
        }

        .right-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: #f9fafb;
        }

        h2 { font-size: 28px; margin-bottom: 8px; color: #111827; }
        p.subtitle { color: #6b7280; font-size: 16px; margin-bottom: 30px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; color: #374151; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 18px; 
            background-color: #f9fafb;
            -webkit-appearance: none; 
        }
        input:focus { border-color: #2563eb; background-color: #fff; outline: none; }

        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
        }
        .submit-btn:active { background-color: #1d4ed8; }

        .counter-card { 
            background: #eff6ff; 
            border: 1px solid #bfdbfe; 
            padding: 24px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 25px; 
        }
        .counter-card h3 { font-size: 14px; color: #1e40af; text-transform: uppercase; }
        .counter-card .number { font-size: 56px; font-weight: 800; color: #1d4ed8; }

        .log-container { flex: 1; overflow-y: auto; background: white; border-radius: 8px; border: 1px solid #e5e7eb; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #f8fafc; color: #64748b; position: sticky; top: 0; }
        
        .success-toast {
            display: none;
            background-color: #10b981;
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-top: 20px;
        }

        .action-buttons {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }

        .download-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .clear-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; font-weight: 500; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left-panel, .right-panel { flex: none; width: 100%; padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>Event Check-In</h2>
        <p class="subtitle">Please fill out your info to register.</p>
        
        <form id="attendanceForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="First and Last Name" required>
            </div>
            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="Mobile Number" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>
            <button type="submit" class="submit-btn">Check In</button>
        </form>

        <div id="successToast" class="success-toast">✓ Check-in successful!</div>
    </div>

    <div class="right-panel">
        <div class="counter-card">
            <h3>Current Attendance</h3>
            <div class="number" id="totalCount">0</div>
        </div>

        <div class="log-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="action-buttons">
            <button class="download-btn" onclick="downloadCSV()">Download Excel (CSV)</button>
            <button class="clear-btn" onclick="clearData()">Wipe Data</button>
        </div>
    </div>

<script>
    let memoryBackup = [];

    function getRecords() {
        try {
            const local = localStorage.getItem('universal_attendance');
            return local ? JSON.parse(local) : memoryBackup;
        } catch (e) {
            return memoryBackup;
        }
    }

    function saveRecords(records) {
        memoryBackup = records;
        try {
            localStorage.setItem('universal_attendance', JSON.stringify(records));
        } catch (e) {
            console.log("LocalStorage restricted on this mobile browser. Saved to temporary memory.");
        }
    }

    function updateDisplay() {
        const records = getRecords();
        document.getElementById('totalCount').innerText = records.length;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        for (let i = records.length - 1; i >= 0; i--) {
            tbody.innerHTML += `
                <tr>
                    <td><span style="color:#6b7280;">${records[i].time}</span></td>
                    <td><strong>${records[i].name}</strong></td>
                </tr>
            `;
        }
    }

    function handleSubmit(event) {
        event.preventDefault();

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        const newEntry = {
            date: `${year}-${month}-${day}`, // YYYY-MM-DD formatting
            name: document.getElementById('fullName').value,
            mobile: document.getElementById('mobileNumber').value,
            email: document.getElementById('email').value,
            time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };

        const records = getRecords();
        records.push(newEntry);
        saveRecords(records);

        document.getElementById('attendanceForm').reset();
        updateDisplay();

        const toast = document.getElementById('successToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    function downloadCSV() {
        const records = getRecords();
        if (records.length === 0) {
            alert("No data to download yet!");
            return;
        }

        // Added 'Date' column to the header definition
        let csvContent = "data:text/csv;charset=utf-8,Date,Time,Name,Mobile,Email\n";
        
        // Iterates through data injecting the newly captured date field
        records.forEach(r => {
            csvContent += `"${r.date || ''}","${r.time}","${r.name}","${r.mobile}","${r.email}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `attendance_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearData() {
        if (confirm("Clear all attendance data?")) {
            memoryBackup = [];
            try { localStorage.removeItem('universal_attendance'); } catch(e){}
            updateDisplay();
        }
    }

    window.onload = updateDisplay;
</script>
</body>
</html>
