<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events Attendance Log</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: #f3f4f6; 
            display: flex; 
            min-height: 100vh; 
            color: #1f2937;
        }

        .left-panel {
            flex: 1.2;
            background: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid #e5e7eb;
        }

        .right-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: #f9fafb;
        }

        h2 { font-size: 28px; margin-bottom: 8px; color: #111827; }
        p.subtitle { color: #6b7280; font-size: 16px; margin-bottom: 30px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; color: #374151; }
        
        input[type="text"], input[type="tel"], input[type="email"], select { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 18px; 
            background-color: #f9fafb;
            -webkit-appearance: none; 
            appearance: none;
        }

        /* Custom arrow styling wrapper for select box */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: "▼";
            font-size: 12px;
            color: #4b5563;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        input:focus, select:focus { border-color: #2563eb; background-color: #fff; outline: none; }

        /* Radio Options Styling */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            color: #4b5563;
        }
        .radio-label input[type="radio"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
        }
        .submit-btn:disabled { background-color: #93c5fd; cursor: not-allowed; }
        .submit-btn:active:not(:disabled) { background-color: #1d4ed8; }

        .counter-card { 
            background: #eff6ff; 
            border: 1px solid #bfdbfe; 
            padding: 24px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 25px; 
        }
        .counter-card h3 { font-size: 14px; color: #1e40af; text-transform: uppercase; }
        .counter-card .number { font-size: 56px; font-weight: 800; color: #1d4ed8; }

        .log-container { flex: 1; overflow-y: auto; background: white; border-radius: 8px; border: 1px solid #e5e7eb; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #f8fafc; color: #64748b; position: sticky; top: 0; }
        
        /* Referral Tag Badge Styling on Live UI */
        .referral-tag {
            display: inline-block;
            margin-top: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #4b5563;
            background-color: #e5e7eb;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .success-toast {
            display: none;
            background-color: #10b981;
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-top: 20px;
        }

        .action-buttons {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }

        .download-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .clear-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; font-weight: 500; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left-panel, .right-panel { flex: none; width: 100%; padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>Event Check-In</h2>
        <p class="subtitle">Please fill out your info to register.</p>
        
        <form id="attendanceForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="title">Title</label>
                <div class="select-wrapper">
                    <select id="title" required>
                        <option value="" disabled selected>Select title...</option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Miss">Miss</option>
                        <option value="Ms">Ms</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="First and Last Name" required>
            </div>
            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="Mobile Number" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>
            <div class="form-group">
                <label>How did you hear about today's event?</label>
                <BR>
                <div class="radio-group">
                   <label class="radio-label">
                        <input type="radio" name="referral" value="Social Media" required> Social Media
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="referral" value="Flier"> Flier
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="referral" value="Word of mouth"> Word of mouth
                    </label>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Check In</button>
        </form>

        <div id="successToast" class="success-toast">✓ Check-in successful!</div>
    </div>

    <div class="right-panel">
        <div class="counter-card">
            <h3>Current Attendance</h3>
            <div class="number" id="totalCount">0</div>
        </div>

        <div class="log-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Attendee Details</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="action-buttons">
            <button class="download-btn" onclick="downloadCSV()">Download Excel (CSV)</button>
            <button class="clear-btn" onclick="clearData()">Wipe Data</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        onSnapshot, 
        query, 
        orderBy, 
        getDocs, 
        deleteDoc, 
        doc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Paste your Web App's Firebase configuration here
    const firebaseConfig = {
      apiKey: "AIzaSyAyY5fZNPKdALIEofwQ4anOGMOKqdKmeVs",
      authDomain: "events-onlineform.firebaseapp.com",
      projectId: "events-onlineform",
      storageBucket: "events-onlineform.firebasestorage.app",
      messagingSenderId: "986891284988",
      appId: "1:986891284988:web:e91536179c92dd79474279"
    };

    // Initialize Firebase & Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const attendanceCollection = collection(db, "attendance");

    // Global array to cache records for the CSV download functionality
    let currentRecords = [];

    // 2. Real-time listener: Auto-updates UI on ALL open browsers instantly
    const q = query(attendanceCollection, orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        currentRecords = [];
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            currentRecords.push({ id: doc.id, ...data });

            const displayTitle = data.title ? `${data.title} ` : '';
            
            // Build the referral visual label if it exists
            const displayReferral = data.referral 
                ? `<br><span class="referral-tag">Source: ${data.referral}</span>` 
                : '';

            tbody.innerHTML += `
                <tr>
                    <td style="vertical-align: top;"><span style="color:#6b7280;">${data.time}</span></td>
                    <td>
                        <strong>${displayTitle}${data.name}</strong>
                        ${displayReferral}
                    </td>
                </tr>
            `;
        });
        
        document.getElementById('totalCount').innerText = currentRecords.length;
    });

    // 3. Handle Form Submission to Database
    async function handleSubmit(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');

        const referralValue = document.querySelector('input[name="referral"]:checked').value;

        const newEntry = {
            date: `${year}-${month}-${day}`,
            title: document.getElementById('title').value,
            name: document.getElementById('fullName').value,
            mobile: document.getElementById('mobileNumber').value,
            email: document.getElementById('email').value,
            referral: referralValue,
            time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            timestamp: now.getTime()
        };

        try {
            await addDoc(attendanceCollection, newEntry);
            
            document.getElementById('attendanceForm').reset();
            const toast = document.getElementById('successToast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        } catch (error) {
            console.error("Error saving data to Firebase: ", error);
            alert("Submission failed. Please check internet connection.");
        } finally {
            submitBtn.disabled = false;
        }
    }

    // 4. Download Database contents to CSV
    function downloadCSV() {
        if (currentRecords.length === 0) {
            alert("No data to download yet!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,Date,Time,Title,Name,Mobile,Email,Referral Source\n";
        
        [...currentRecords].reverse().forEach(r => {
            csvContent += `"${r.date || ''}","${r.time}","${r.title || ''}","${r.name}","${r.mobile}","${r.email}","${r.referral || ''}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `attendance_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 5. Remote Wipe Database Data
    async function clearData() {
        if (confirm("Wipe ALL global attendance records from the cloud? This cannot be undone.")) {
            try {
                const snapshot = await getDocs(attendanceCollection);
                const deletePromises = [];
                snapshot.forEach((documentSnapshot) => {
                    deletePromises.push(deleteDoc(doc(db, "attendance", documentSnapshot.id)));
                });
                await Promise.all(deletePromises);
                alert("Cloud database successfully cleared!");
            } catch (error) {
                console.error("Wipe failed: ", error);
                alert("Permission denied or server error.");
            }
        }
    }

    window.handleSubmit = handleSubmit;
    window.downloadCSV = downloadCSV;
    window.clearData = clearData;
</script>
</body>
</html>
